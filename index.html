<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOOMYOUNG Portfolio</title>

    <link rel="stylesheet" href="assets/css/style.css" />

    <!-- AOS -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
    <!-- Swiper -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
  </head>
  <body>
    <a class="skip" href="#main">본문 바로가기</a>

    <header class="site-header">
      <div class="header-inner">
        <div class="brand" aria-label="copyright">
          ⓒ SOOMYOUNG. All Rights Reserved
        </div>

        <nav class="gnb" aria-label="primary">
          <a href="#home" class="gnb-link is-active">Home</a>
          <a href="#about" class="gnb-link">About</a>
          <a href="#project" class="gnb-link">Project</a>
          <a href="#skill" class="gnb-link">Skill</a>
          <a href="#contact" class="gnb-link">Contact</a>
        </nav>

        <a class="header-cta" href="#contact">CONTACT</a>
      </div>
    </header>

    <main id="main">
      <section class="hero" id="home" aria-label="Hero">
        <div class="hero-grid" aria-hidden="true"></div>

        <div class="hero-inner">
          <div class="hero-media hero-media--top" data-aos="fade-left" data-aos-duration="800">
            <div class="media-card media-card--olive" role="img" aria-label="프로젝트 미리보기 이미지 영역">
              <div class="mock mock--phone"></div>
              <div class="mock mock--phone mock--phone2"></div>
            </div>
          </div>

          <div class="hero-copy">
            <p class="hero-title" aria-label="보이는 디자인을 넘어서">
              <span class="sr-only">보이는 디자인을 넘어서</span>
              <span class="split" data-split>보이는 디자인을 넘어서</span>
            </p>

            <p class="hero-title hero-title--second" aria-label="사용자의 흐름을 설계합니다">
              <span class="sr-only">사용자의 흐름을 설계합니다</span>
              <span class="split" data-split>사용자의 흐름을 설계합니다</span>
            </p>
          </div>

          <div class="hero-media hero-media--bottom" data-aos="fade-right" data-aos-duration="800">
            <div class="media-card media-card--teal" role="img" aria-label="프로젝트 미리보기 이미지 영역">
              <div class="mock mock--wide"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- GSAP -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <!-- AOS -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <!-- Swiper -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script src="assets/js/main.js"></script>
  </body>
</html>
