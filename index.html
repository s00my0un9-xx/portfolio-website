<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOOMYOUNG. Web Portfolio</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" />


  <!-- Libraries -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" />

  <link rel="stylesheet" href="./assets/css/style.css" />
</head>

<body>
  <a class="skip-link" href="#main">본문으로 바로가기</a>

  <header class="site-header" data-animate="header">
    <div class="container header-inner">
      <a class="brand" href="#home" aria-label="SOOMYOUNG Web Portfolio">
        <span class="brand-line brand-line-primary">SOOMYOUNG.</span>
        <span class="brand-line brand-line-secondary">Web Portfolio</span>
      </a>

      <nav class="nav" aria-label="Primary">
        <ul class="nav-list" id="primaryNav">
          <li><a class="nav-link" href="#home">Home</a></li>
          <li><a class="nav-link" href="#about">About</a></li>
          <li><a class="nav-link" href="#project">Project</a></li>
          <li><a class="nav-link" href="#skill">Skill</a></li>
          <li><a class="nav-link" href="#contact">Contact</a></li>
        </ul>
      </nav>

      <div class="header-actions">
        <a class="cta" href="#contact">CONTACT</a>
        <button class="hamburger" type="button" aria-label="메뉴 열기" aria-controls="mobileMenu" aria-expanded="false">
          <span class="hamburger-lines" aria-hidden="true"></span>
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    <div class="mobile-menu" id="mobileMenu" hidden>
      <div class="container mobile-menu-inner">
        <a class="mobile-link" href="#home">Home</a>
        <a class="mobile-link" href="#about">About</a>
        <a class="mobile-link" href="#project">Project</a>
        <a class="mobile-link" href="#skill">Skill</a>
        <a class="mobile-link" href="#contact">Contact</a>
      </div>
    </div>
  </header>

  <main id="main">

    <!-- hero section -->
    <section class="hero" id="home" aria-label="Hero">
      <div class="hero-content">
        <video autoplay loop muted playsinline class="hero-video">
          <source src="./assets/video/hero.mp4" type="video/mp4">
        </video>
        <!-- text video Mint overlay -->
        <svg class="hero-cutout" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
          <defs>
            <mask id="heroTextCutout" maskUnits="userSpaceOnUse" x="0" y="0" width="1600" height="900">
              <!-- 흰색 영역(민트색이 보이게 만듦) -->
              <rect x="0" y="0" width="1600" height="900" fill="white" />
              <!-- 글자 부분 검은색(투명하게) -->
              <g class="hero-cutout__text" fill="black" text-anchor="middle">
                <text x="500" y="430">DESIGN</text>
                <text x="800" y="610">EXPERIENCE</text>
              </g>
            </mask>
          </defs>
          <rect class="hero-cutout__mint" x="0" y="0" width="1600" height="900" mask="url(#heroTextCutout)" />
        </svg>

        <!-- Accessible text (not visually rendered) -->
        <div class="sr-only" aria-label="Hero title">
          <h2>DESIGNER</h2>
          <h2>EXPERIENCE</h2>
        </div>
      </div>
    </section>

    <!-- about section -->
    <section class="section placeholder" id="about" data-aos="fade-up">
      <div class="container">
        <h2 class="section-title">About</h2>
        <p class="section-desc">콘텐츠 영역은 다음 단계에서 확장 가능합니다.</p>
      </div>
    </section>

    <!-- project section -->
    <section class="section placeholder" id="project" data-aos="fade-up">
      <div class="container">
        <h2 class="section-title">Project</h2>
        <p class="section-desc">Swiper 섹션을 여기에 추가할 수 있습니다.</p>
      </div>
    </section>

    <!-- skill section -->
    <section class="section placeholder" id="skill" data-aos="fade-up">
      <div class="container">
        <h2 class="section-title">Skill</h2>
        <p class="section-desc">AOS 애니메이션 예시가 적용되어 있습니다.</p>
      </div>
    </section>

    <!-- contact section -->
    <section class="section placeholder" id="contact" data-aos="fade-up">
      <div class="container">
        <h2 class="section-title">Contact</h2>
        <p class="section-desc">CTA 버튼이 이 섹션으로 이동합니다.</p>
      </div>
    </section>
  </main>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="./assets/js/main.js"></script>
</body>

</html>
